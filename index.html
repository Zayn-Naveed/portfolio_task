<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Naveed | Portfolio</title>
 
    <!-- Swiper.js CSS (the slider library)  -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation bar or nav bar  -->
    <nav class="navbar">
        <div class="logo">Zain Naveed</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section Sliders -->
     <section id="home" class="hero">
        <div class="swiper heroSwiper">
            <div class="swiper-wrapper">
                <!-- Slide 1 -->
                <div class="swiper-slide">
                    <img src="https://picsum.photos/1400/700?random=1" alt="Web Development Project">
                    <div class="slide-content">
                        <h1>Web Development</h1>
                        <p>Building modern, responsive websites with clean code.</p>
                        <a href="" class="btn">View Project</a>
                    </div>
                </div>

                <!-- Slide 2 -->

                <div class="swiper-slide">
                    <img src="https://picsum.photos/1400/700?random=2" alt="AI Project Demo">
                    <div class="slide-content">
                        <h1>AI Project Demo</h1>
                        <p>Exploring intelligent solutions with modern technology.</p>
                        <a href="#" class="btn">Learn More</a>
                    </div>
                </div>

                <!-- Slide 3 -->

                <div class="swiper-slide">
                    <img src="https://picsum.photos/1400/700?random=3" alt="Web Development Project">
                    <div class="slide-content">
                        <h1>UI/UX Design</h1>
                        <p>Crafting beautiful interfaces that users love.</p>
                        <a href="#" class="btn">See Work</a>
                    </div>
                </div>

            </div>
            
            <!-- Navigation Arrows -->

            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>

            <!-- Dots -->

            <div class="swiper-pagination"></div>

        </div>
     </section>

     <!-- Swiper.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Your own JS file -->
    <script src="script.js"></script>
</body>
</html>
